<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" width="1000" height="750">
  <!-- Background -->
  <rect width="1000" height="750" fill="#0f0f1a" rx="12"/>
  
  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="#ffd700" font-size="20" font-weight="bold">🕉️ SATU VENDING MACHINE - WIRING DIAGRAM</text>
  <text x="500" y="65" text-anchor="middle" fill="#888" font-size="13">Version 1.0 | April 2025 | ESP32-S3 + Dual MCP23017</text>
  <line x1="50" y1="80" x2="950" y2="80" stroke="#333" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- ESP32 DISPLAY BOARD -->
  <!-- ============================================================ -->
  <rect x="350" y="100" width="300" height="90" rx="12" fill="#1e2a3a" stroke="#ffd700" stroke-width="2"/>
  <text x="500" y="130" text-anchor="middle" fill="#ffd700" font-size="15" font-weight="bold">ESP32-S3 Display Board</text>
  <text x="500" y="150" text-anchor="middle" fill="#aaa" font-size="12">ESP32-8048S070C (7" Capacitive Touch)</text>
  <text x="500" y="170" text-anchor="middle" fill="#888" font-size="11">16MB Flash | 8MB PSRAM | WiFi + Bluetooth</text>

  <!-- Port labels on ESP32 -->
  <rect x="360" y="195" width="60" height="20" rx="4" fill="#2c3e50" stroke="#555" stroke-width="0.5"/>
  <text x="390" y="209" text-anchor="middle" fill="#aaa" font-size="9">P1 (UART)</text>
  
  <rect x="470" y="195" width="60" height="20" rx="4" fill="#2c3e50" stroke="#555" stroke-width="0.5"/>
  <text x="500" y="209" text-anchor="middle" fill="#aaa" font-size="9">P3/P4 (I2C)</text>
  
  <rect x="580" y="195" width="60" height="20" rx="4" fill="#2c3e50" stroke="#555" stroke-width="0.5"/>
  <text x="610" y="209" text-anchor="middle" fill="#aaa" font-size="9">USB-C (Power)</text>

  <!-- ============================================================ -->
  <!-- I2C BUS (Green) -->
  <!-- ============================================================ -->
  <line x1="500" y1="215" x2="500" y2="260" stroke="#00ff88" stroke-width="2.5"/>
  <text x="510" y="240" fill="#00ff88" font-size="11">I2C Bus (SDA/SCL)</text>

  <!-- I2C Split -->
  <line x1="500" y1="260" x2="300" y2="300" stroke="#00ff88" stroke-width="2.5"/>
  <line x1="500" y1="260" x2="700" y2="300" stroke="#00ff88" stroke-width="2.5"/>
  
  <text x="350" y="285" fill="#00ff88" font-size="10">Address 0x20</text>
  <text x="570" y="285" fill="#00ff88" font-size="10">Address 0x21</text>

  <!-- ============================================================ -->
  <!-- MCP23017 #1 -->
  <!-- ============================================================ -->
  <rect x="140" y="310" width="320" height="200" rx="10" fill="#0d1f1a" stroke="#00ff88" stroke-width="1.5"/>
  <text x="300" y="340" text-anchor="middle" fill="#00ff88" font-size="14" font-weight="bold">MCP23017 #1 (I2C Expander)</text>
  <text x="300" y="360" text-anchor="middle" fill="#888" font-size="11">Address 0x20 (A0=A1=A2=GND)</text>
  <line x1="160" y1="372" x2="440" y2="372" stroke="#2a4a3a" stroke-width="1"/>

  <!-- PORTA -->
  <text x="160" y="392" fill="#ffd700" font-size="12" font-weight="bold">PORTA (Pins A0-A7) → INPUTS</text>
  <text x="160" y="410" fill="#aaa" font-size="11">A0 ───► IR Sensor 1</text>
  <text x="160" y="425" fill="#aaa" font-size="11">A1 ───► IR Sensor 2</text>
  <text x="160" y="440" fill="#aaa" font-size="11">A2 ───► IR Sensor 3</text>
  <text x="160" y="455" fill="#aaa" font-size="11">A3 ───► IR Sensor 4</text>
  <text x="320" y="410" fill="#aaa" font-size="11">A4 ───► IR Sensor 5</text>
  <text x="320" y="425" fill="#aaa" font-size="11">A5 ───► IR Sensor 6</text>
  <text x="320" y="440" fill="#aaa" font-size="11">A6 ───► IR Sensor 7</text>
  <text x="320" y="455" fill="#aaa" font-size="11">A7 ───► IR Sensor 8</text>

  <line x1="160" y1="465" x2="440" y2="465" stroke="#2a4a3a" stroke-width="1"/>

  <!-- PORTB -->
  <text x="160" y="483" fill="#ffd700" font-size="12" font-weight="bold">PORTB (Pins B0-B7) → OUTPUTS</text>
  <text x="160" y="498" fill="#aaa" font-size="11">B0-B5 ───► Relays 1-6</text>
  <text x="320" y="498" fill="#aaa" font-size="11">B6-B7 ───► LED Indicators</text>

  <!-- ============================================================ -->
  <!-- MCP23017 #2 -->
  <!-- ============================================================ -->
  <rect x="540" y="310" width="320" height="200" rx="10" fill="#0d1f1a" stroke="#00ff88" stroke-width="1.5"/>
  <text x="700" y="340" text-anchor="middle" fill="#00ff88" font-size="14" font-weight="bold">MCP23017 #2 (I2C Expander)</text>
  <text x="700" y="360" text-anchor="middle" fill="#888" font-size="11">Address 0x21 (A0=VCC, A1=GND, A2=GND)</text>
  <line x1="560" y1="372" x2="840" y2="372" stroke="#2a4a3a" stroke-width="1"/>

  <!-- PORTA -->
  <text x="560" y="392" fill="#ffd700" font-size="12" font-weight="bold">PORTA (Pins A0-A7) → INPUTS</text>
  <text x="560" y="410" fill="#aaa" font-size="11">A0-A1 ───► IR Sensors 9-10</text>
  <text x="560" y="430" fill="#888" font-size="11">A2-A7 ───► Spare / Expansion</text>

  <line x1="560" y1="445" x2="840" y2="445" stroke="#2a4a3a" stroke-width="1"/>

  <!-- PORTB -->
  <text x="560" y="463" fill="#ffd700" font-size="12" font-weight="bold">PORTB (Pins B0-B7) → OUTPUTS</text>
  <text x="560" y="480" fill="#aaa" font-size="11">B0-B3 ───► Relays 7-10</text>
  <text x="560" y="495" fill="#aaa" font-size="11">B4 ───► Water Pump Relay</text>
  <text x="560" y="510" fill="#aaa" font-size="11">B5 ───► Door Lock Solenoid</text>

  <!-- ============================================================ -->
  <!-- UART LINE (Red) -->
  <!-- ============================================================ -->
  <line x1="390" y1="215" x2="390" y2="540" stroke="#ff6666" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="400" y="380" fill="#ff6666" font-size="11">UART (TX/RX)</text>

  <!-- ============================================================ -->
  <!-- ID CARD READER -->
  <!-- ============================================================ -->
  <rect x="310" y="550" width="160" height="60" rx="10" fill="#2a1a1a" stroke="#ff6666" stroke-width="1.5"/>
  <text x="390" y="575" text-anchor="middle" fill="#ff6666" font-size="12" font-weight="bold">ID Card Reader</text>
  <text x="390" y="595" text-anchor="middle" fill="#aaa" font-size="10">RDM6300 (UART, 5V)</text>

  <!-- ============================================================ -->
  <!-- RELAY OUTPUTS -->
  <!-- ============================================================ -->
  <rect x="140" y="630" width="720" height="55" rx="10" fill="#1a1a2a" stroke="#ff8888" stroke-width="1.5"/>
  <text x="500" y="653" text-anchor="middle" fill="#ff8888" font-size="13" font-weight="bold">RELAY OUTPUTS (12V Load)</text>
  <text x="500" y="673" text-anchor="middle" fill="#aaa" font-size="11">10 Motors + 1 Water Pump + 1 Door Lock | Each Relay: COM→12V+ | NO→Device+ | Device-→12V GND</text>

  <!-- ============================================================ -->
  <!-- POWER DISTRIBUTION -->
  <!-- ============================================================ -->
  <rect x="140" y="695" width="720" height="45" rx="8" fill="#1a1a2a" stroke="#ffd700" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="500" y="715" text-anchor="middle" fill="#ffd700" font-size="12" font-weight="bold">POWER SUPPLIES</text>
  <text x="500" y="732" text-anchor="middle" fill="#aaa" font-size="11">🔴 5V 5A → ESP32 + MCP23017 + Sensors + Relay Coils | 🔵 12V 10A → Relay COM (Motors + Pump)</text>

  <!-- ============================================================ -->
  <!-- LEGEND -->
  <!-- ============================================================ -->
  <rect x="20" y="100" width="160" height="130" rx="8" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="100" y="122" text-anchor="middle" fill="#ffd700" font-size="12" font-weight="bold">LEGEND</text>
  <line x1="35" y1="140" x2="70" y2="140" stroke="#00ff88" stroke-width="2.5"/>
  <text x="80" y="144" fill="#aaa" font-size="10">I2C (SDA/SCL)</text>
  <line x1="35" y1="160" x2="70" y2="160" stroke="#ff6666" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="80" y="164" fill="#aaa" font-size="10">UART (TX/RX)</text>
  <line x1="35" y1="180" x2="70" y2="180" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="80" y="184" fill="#aaa" font-size="10">Power</text>
  <rect x="35" y="195" width="35" height="14" rx="2" fill="#1e2a3a" stroke="#ffd700" stroke-width="1"/>
  <text x="80" y="207" fill="#aaa" font-size="10">ESP32/MCP</text>
</svg>
